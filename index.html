<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>BPI Smart Dock TV</title>

  <style>
    :root {
      --apps-script-top-bar-height: 36px;
      --content-scale: 0.9;
      --content-width: 111.111vw;
      --content-height: calc(111.111dvh + 40px);
      background: #000;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      min-height: 100%;
      overflow: hidden;
      background: #000;
    }

    body {
      position: fixed;
      inset: 0;
      overscroll-behavior: none;
    }

    .iframe-wrap {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      background: #000;
    }

    iframe {
      position: absolute;
      top: calc(var(--apps-script-top-bar-height) * -1);
      left: 0;
      width: var(--content-width);
      height: var(--content-height);
      border: 0;
      display: block;
      background: #000;
      transform: scale(var(--content-scale));
      transform-origin: top left;
    }
  </style>
</head>

<body>
  <div class="iframe-wrap">
    <iframe id="dockFrame" title="BPI Smart Dock TV" allowfullscreen></iframe>
  </div>

  <script>
    const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbw1wiBByN1av_78-1grWP2CDhyjAm8uqV4Dm136NP0NWgvcVCgFN1cyCquRr4j3mK-S/exec';
    const TOP_BAR_HEIGHT = 36;
    const iframe = document.getElementById('dockFrame');

    function applyScale(params) {
      const rawScale = Number(params.get('scale') || params.get('zoom') || 0.9);
      const scale = Number.isFinite(rawScale) ? Math.min(1, Math.max(0.75, rawScale)) : 0.9;
      const inverse = 100 / scale;

      document.documentElement.style.setProperty('--content-scale', String(scale));
      document.documentElement.style.setProperty('--content-width', inverse + 'vw');
      document.documentElement.style.setProperty('--content-height', 'calc(' + inverse + 'dvh + ' + (TOP_BAR_HEIGHT / scale) + 'px)');

      params.delete('scale');
      params.delete('zoom');
    }

    function buildWebAppUrl() {
      const currentParams = new URLSearchParams(window.location.search);
      const targetUrl = new URL(WEBAPP_URL);

      applyScale(currentParams);

      if (!currentParams.has('page')) {
        currentParams.set('page', 'tv-pair');
      }

      if (currentParams.get('page') === 'tv-pair') {
        if (!currentParams.has('left')) currentParams.set('left', 'BPI-D001');
        if (!currentParams.has('right')) currentParams.set('right', 'BPI-D002');
        if (!currentParams.has('theme')) currentParams.set('theme', 'red');
      }

      currentParams.forEach((value, key) => {
        targetUrl.searchParams.set(key, value);
      });

      return targetUrl.toString();
    }

    iframe.src = buildWebAppUrl();
  </script>
</body>
</html>
